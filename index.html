<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Undertale Card Duel — Deluxe Edition</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
  
  :root {
    --ut-black: #000000;
    --ut-white: #ffffff;
    --ut-red: #ff0000;
    --ut-yellow: #ffff00;
    --ut-green: #00ff00;
    --ut-blue: #00a2e8;
  }
  
  body {
    margin: 0;
    background-color: var(--ut-black);
    color: var(--ut-white);
    font-family: 'VT323', 'Courier New', Courier, monospace;
    font-size: 20px;
    user-select: none;
    -webkit-touch-callout: none;
    overflow-x: hidden;
  }

  /* UT-style panels */
  .ut-panel {
    border: 4px solid var(--ut-white);
    background: var(--ut-black);
    padding: 16px;
    border-radius: 4px;
  }

  .ut-btn {
    background: var(--ut-black);
    color: var(--ut-white);
    border: 2px solid var(--ut-white);
    padding: 8px 16px;
    cursor: pointer;
    text-transform: uppercase;
    font-family: 'VT323', 'Courier New', monospace;
    font-size: 24px;
    transition: all 0.1s;
  }
  .ut-btn:hover:not(:disabled) {
    background: var(--ut-white);
    color: var(--ut-black);
  }
  .ut-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    border-color: #555;
    color: #555;
  }

  /* Cards */
  .card-container {
    perspective: 1000px;
  }
  .ut-card {
    width: 130px;
    height: 180px;
    border: 3px solid var(--ut-white);
    background: #111;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    padding: 8px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    position: relative;
    overflow: hidden;
  }
  .ut-card:hover {
    transform: translateY(-10px) scale(1.05);
    box-shadow: 0 10px 20px rgba(255,255,255,0.2);
  }
  .ut-card.disabled {
    opacity: 0.5;
    pointer-events: none;
    filter: grayscale(1);
  }
  .card-cat-items { border-color: var(--ut-green); }
  .card-cat-options { border-color: var(--ut-yellow); }
  .card-cat-magic { border-color: var(--ut-blue); }
  
  .card-title { font-size: 18px; font-weight: bold; text-align: center; margin-bottom: 4px; line-height: 1.1; }
  .card-desc { font-size: 14px; color: #ccc; text-align: center; flex-grow: 1; display: flex; align-items: center; justify-content: center; line-height: 1.1;}
  .card-cost { position: absolute; bottom: 4px; right: 6px; font-size: 16px; color: var(--ut-blue); }
  .card-tag { position: absolute; top: 4px; left: 4px; font-size: 12px; background: var(--ut-white); color: var(--ut-black); padding: 0 4px; }

  /* Bars */
  .bar-bg { width: 100%; height: 20px; background: #440000; border: 1px solid #fff; }
  .bar-fill-hp { height: 100%; background: var(--ut-red); transition: width 0.3s; }
  .bar-fill-st { height: 100%; background: var(--ut-green); transition: width 0.3s; }

  /* Animations */
  @keyframes shake {
    0% { transform: translate(1px, 1px) rotate(0deg); }
    10% { transform: translate(-1px, -2px) rotate(-1deg); }
    20% { transform: translate(-3px, 0px) rotate(1deg); }
    30% { transform: translate(3px, 2px) rotate(0deg); }
    40% { transform: translate(1px, -1px) rotate(1deg); }
    50% { transform: translate(-1px, 2px) rotate(-1deg); }
    60% { transform: translate(-3px, 1px) rotate(0deg); }
    70% { transform: translate(3px, 1px) rotate(-1deg); }
    80% { transform: translate(-1px, -1px) rotate(1deg); }
    90% { transform: translate(1px, 2px) rotate(0deg); }
    100% { transform: translate(1px, -2px) rotate(-1deg); }
  }
  .shake { animation: shake 0.5s; }
  
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  .blinking { animation: blink 0.2s infinite; }

  @keyframes fireBeam {
    0% { width: 0; opacity: 0; }
    20% { width: 100%; opacity: 1; background: white; }
    50% { background: var(--ut-blue); }
    100% { opacity: 0; width: 100%; }
  }

  /* Minigame Overlays */
  .minigame-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 50;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  
  #battlebox {
    width: clamp(300px, 90vw, 600px);
    height: clamp(200px, 50vh, 400px);
    border: 4px solid white;
    position: relative;
    overflow: hidden;
    background: black;
  }
  .soul {
    position: absolute; width: 16px; height: 16px;
    background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><path d="M16 28s-12-9-12-16c0-4 4-7 8-7 2 0 4 2 4 2s2-2 4-2c4 0 8 3 8 7 0 7-12 16-12 16z" fill="red"/></svg>') no-repeat center;
    background-size: contain;
    z-index: 10;
  }
  
  /* Fight Bar */
  .fight-container {
    width: clamp(300px, 90vw, 600px);
    height: 150px;
    background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><rect width="100%" height="100%" fill="black" stroke="white" stroke-width="8"/></svg>');
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .fight-target {
    width: 20px; height: 120px; background: rgba(255, 255, 0, 0.4); border: 2px solid yellow; position: absolute;
  }
  .fight-cursor {
    width: 8px; height: 130px; background: white; position: absolute; left: 0; box-shadow: 0 0 8px white;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--ut-black); border-left: 1px solid var(--ut-white); }
  ::-webkit-scrollbar-thumb { background: var(--ut-white); }

  .mobile-controls {
    display: none; position: absolute; bottom: 10px; right: 10px; z-index: 20;
    grid-template-columns: 50px 50px 50px; grid-template-rows: 50px 50px; gap: 5px;
  }
  .d-btn { background: rgba(255,255,255,0.2); border: 2px solid white; color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; border-radius: 50%; user-select: none; }
  .d-up { grid-column: 2; grid-row: 1; }
  .d-left { grid-column: 1; grid-row: 2; }
  .d-down { grid-column: 2; grid-row: 2; }
  .d-right { grid-column: 3; grid-row: 2; }
  @media (pointer: coarse) { .mobile-controls { display: grid; } }
</style>
</head>
<body>
<div id="root"></div>

<!-- External Scripts for Firebase -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
  import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
  import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, getDocs, updateDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

  // --- GAME DATA & CARDS ---
  const CARDS = {
    // Frisk Options
    'f_fight': { id: 'f_fight', name: 'FIGHT', cat: 'OPTIONS', desc: 'Timing minigame for damage.', cost: 0, role: 'Frisk' },
    'f_act': { id: 'f_act', name: 'ACT', cat: 'OPTIONS', desc: 'Lower enemy DEF by 1.', cost: 0, role: 'Frisk' },
    'f_mercy': { id: 'f_mercy', name: 'MERCY', cat: 'OPTIONS', desc: 'Attempt to spare/flee.', cost: 0, role: 'Frisk' },
    // Frisk Items
    'f_candy': { id: 'f_candy', name: 'Monster Candy', cat: 'ITEMS', desc: 'Heal 15 HP.', cost: 0, role: 'Frisk', heal: 15 },
    'f_donut': { id: 'f_donut', name: 'Spider Donut', cat: 'ITEMS', desc: 'Heal 20 HP.', cost: 0, role: 'Frisk', heal: 20 },
    'f_pie': { id: 'f_pie', name: 'B.Scotch Pie', cat: 'ITEMS', desc: 'Full Heal.', cost: 0, role: 'Frisk', healFull: true, rarity: 'rare' },
    'f_noodles': { id: 'f_noodles', name: 'Insta-Noodles', cat: 'ITEMS', desc: 'Heal 40 HP.', cost: 0, role: 'Frisk', heal: 40 },
    'f_hero': { id: 'f_hero', name: 'Leg. Hero', cat: 'ITEMS', desc: '+30 HP, +1 ATK.', cost: 0, role: 'Frisk', heal: 30, atkBuff: 1, rarity: 'rare' },
    
    // Sans Options
    's_nap': { id: 's_nap', name: 'Nap', cat: 'OPTIONS', desc: 'Skip 1 turn, full heal.', cost: 0, role: 'Sans', nap: true },
    's_mercy': { id: 's_mercy', name: 'MERCY', cat: 'OPTIONS', desc: 'Spare the human.', cost: 0, role: 'Sans' },
    // Sans Items
    's_dog': { id: 's_dog', name: 'Hot Dog...?', cat: 'ITEMS', desc: 'Heal 20 HP, +15 ST.', cost: 0, role: 'Sans', heal: 20, st: 15 },
    's_cat': { id: 's_cat', name: 'Hot Cat', cat: 'ITEMS', desc: 'Heal 10 HP, +30 ST.', cost: 0, role: 'Sans', heal: 10, st: 30 },
    's_ketchup': { id: 's_ketchup', name: 'Ketchup', cat: 'ITEMS', desc: 'Full ST recover.', cost: 0, role: 'Sans', stFull: true, rarity: 'rare' },
    // Sans Magic
    's_bone1': { id: 's_bone1', name: 'Bone Throw', cat: 'MAGIC', desc: 'Basic sliding bones.', cost: 15, role: 'Sans', pattern: 'bones_easy' },
    's_bone2': { id: 's_bone2', name: 'Bone Jumps', cat: 'MAGIC', desc: 'Fast vertical bones.', cost: 25, role: 'Sans', pattern: 'bones_hard' },
    's_blaster': { id: 's_blaster', name: 'G. Blaster', cat: 'MAGIC', desc: 'Massive beam blasts.', cost: 40, role: 'Sans', pattern: 'blasters', rarity: 'rare' },
  };

  const DEFAULT_DECK = {
    'Frisk': ['f_fight', 'f_act', 'f_mercy', 'f_candy', 'f_candy', 'f_donut'],
    'Sans': ['s_nap', 's_mercy', 's_dog', 's_bone1', 's_bone1', 's_bone2']
  };

  const PREMIUM_POOL = ['f_pie', 'f_noodles', 'f_hero', 's_cat', 's_ketchup', 's_blaster'];

  // Calculate level from EXP
  function getLevel(exp) {
    const table = [0, 10, 30, 70, 120, 200, 300, 500, 800, 1200, 1700, 2500, 3500, 5000, 10000];
    let lv = 1;
    for(let i=0; i<table.length; i++){ if(exp >= table[i]) lv = i+1; }
    return lv;
  }
  function getStatsForLV(lv) {
    return { hp: 16 + (lv*4), atk: lv * 2, def: Math.floor(lv/3) };
  }

  // --- REACT APP ---
  window.initReactApp = (firebaseConfigStr, appIdStr, initialTokenStr) => {
    const firebaseConfig = JSON.parse(firebaseConfigStr);
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = appIdStr || 'undertale-card-duel';

    const { useState, useEffect, useRef, useLayoutEffect, useCallback } = React;

    // --- SUB-COMPONENTS ---

    const FightMinigame = ({ onComplete }) => {
      const cursorRef = useRef(null);
      const reqRef = useRef(null);
      const [pos, setPos] = useState(0);
      const [dir, setDir] = useState(1);
      const [done, setDone] = useState(false);

      useLayoutEffect(() => {
        if(done) return;
        let x = 0; let d = 1; const speed = 8;
        const loop = () => {
          x += d * speed;
          if (x >= 100) { x = 100; d = -1; }
          if (x <= 0) { x = 0; d = 1; }
          if (cursorRef.current) cursorRef.current.style.left = `${x}%`;
          reqRef.current = requestAnimationFrame(loop);
        };
        reqRef.current = requestAnimationFrame(loop);
        return () => cancelAnimationFrame(reqRef.current);
      }, [done]);

      const handleStop = () => {
        if(done) return;
        setDone(true);
        cancelAnimationFrame(reqRef.current);
        const finalX = parseFloat(cursorRef.current.style.left);
        // Center is 50. Distance from center.
        const dist = Math.abs(50 - finalX);
        let multiplier = 0;
        if(dist < 3) multiplier = 2.0; // Crit
        else if(dist < 15) multiplier = 1.0; // Good
        else if(dist < 30) multiplier = 0.5; // Weak
        else multiplier = 0; // Miss
        
        setTimeout(() => onComplete(multiplier), 1000);
      };

      useEffect(() => {
        const handleSpace = (e) => { if(e.code === 'Space' || e.code === 'Enter') handleStop(); };
        window.addEventListener('keydown', handleSpace);
        return () => window.removeEventListener('keydown', handleSpace);
      }, [done]);

      return React.createElement("div", { className: "minigame-overlay" },
        React.createElement("div", { className: "text-2xl mb-4 text-center blinking" }, done ? "ATTACK LOCKED" : "PRESS SPACE OR TAP TO ATTACK"),
        React.createElement("div", { className: "fight-container", onClick: handleStop },
          React.createElement("div", { className: "fight-target" }),
          React.createElement("div", { className: "fight-cursor", ref: cursorRef })
        )
      );
    };

    const DodgeMinigame = ({ pattern, onComplete }) => {
      const boxRef = useRef(null);
      const soulRef = useRef(null);
      const [hits, setHits] = useState(0);
      const reqRef = useRef(null);
      const hitsRef = useRef(0);
      const isInvuln = useRef(false);

      useLayoutEffect(() => {
        const keys = { w:0, a:0, s:0, d:0 };
        const touch = { u:0, d:0, l:0, r:0 };
        
        const kd = (e) => {
          if(e.key==='ArrowUp'||e.key==='w') keys.w=1;
          if(e.key==='ArrowLeft'||e.key==='a') keys.a=1;
          if(e.key==='ArrowDown'||e.key==='s') keys.s=1;
          if(e.key==='ArrowRight'||e.key==='d') keys.d=1;
        };
        const ku = (e) => {
          if(e.key==='ArrowUp'||e.key==='w') keys.w=0;
          if(e.key==='ArrowLeft'||e.key==='a') keys.a=0;
          if(e.key==='ArrowDown'||e.key==='s') keys.s=0;
          if(e.key==='ArrowRight'||e.key==='d') keys.d=0;
        };
        window.addEventListener('keydown', kd); window.addEventListener('keyup', ku);

        // Mobile touch binds via window to keep it clean
        window.utTouch = (dir, val) => touch[dir] = val;

        const box = boxRef.current;
        let sx = box.clientWidth/2; let sy = box.clientHeight/2;
        const speed = 200; // px/sec
        let lastTime = performance.now();
        const duration = pattern === 'blasters' ? 6000 : 5000;
        let elapsed = 0;

        // Projectiles
        const projs = [];
        const createBone = (x, y, vx, vy, w, h) => {
          const el = document.createElement('div');
          el.style.position = 'absolute';
          el.style.background = 'white'; el.style.borderRadius = '8px';
          el.style.width = w+'px'; el.style.height = h+'px';
          el.style.left = x+'px'; el.style.top = y+'px';
          box.appendChild(el);
          projs.push({ el, x, y, vx, vy, w, h, type: 'bone' });
        };
        const createBlaster = (x, y, w, h, delay) => {
          const el = document.createElement('div');
          el.style.position = 'absolute';
          el.style.width = w+'px'; el.style.height = h+'px';
          el.style.left = x+'px'; el.style.top = y+'px';
          el.innerHTML = `<svg viewBox="0 0 100 100" style="width:40px; height:40px; margin-left:${w/2-20}px"><path d="M20 20 L80 20 L80 60 L60 80 L40 80 L20 60 Z" fill="white"/><circle cx="35" cy="40" r="8" fill="black"/><circle cx="65" cy="40" r="8" fill="black"/></svg>`;
          box.appendChild(el);
          projs.push({ el, x, y, vx:0, vy:0, w, h, type: 'blaster', delay, state: 0, time: 0 });
        };

        // Pattern generation
        if (pattern === 'bones_easy') {
          for(let i=0; i<8; i++) createBone(box.clientWidth + i*80, box.clientHeight - 30 - Math.random()*40, -100 - Math.random()*50, 0, 16, 80);
        } else if (pattern === 'bones_hard') {
          for(let i=0; i<15; i++) {
            const vertical = Math.random() > 0.5;
            if(vertical) createBone(Math.random()*box.clientWidth, box.clientHeight + i*60, 0, -150 - Math.random()*100, 16, 60);
            else createBone(box.clientWidth + i*60, Math.random()*box.clientHeight, -150 - Math.random()*100, 0, 60, 16);
          }
        } else if (pattern === 'blasters') {
          for(let i=0; i<4; i++) {
            createBlaster(0, Math.random()*(box.clientHeight-40), box.clientWidth, 60, i*1.2);
          }
        }

        const rectOverlap = (x1,y1,w1,h1, x2,y2,w2,h2) => {
          return x1 < x2+w2 && x1+w1 > x2 && y1 < y2+h2 && y1+h1 > y2;
        };

        const takeHit = () => {
          if(isInvuln.current) return;
          hitsRef.current++;
          setHits(hitsRef.current);
          isInvuln.current = true;
          soulRef.current.style.opacity = 0.5;
          setTimeout(() => { isInvuln.current = false; if(soulRef.current) soulRef.current.style.opacity = 1; }, 800);
        };

        const loop = (time) => {
          const dt = (time - lastTime) / 1000;
          lastTime = time;
          elapsed += dt * 1000;

          // Move soul
          const dx = (keys.d || touch.r) - (keys.a || touch.l);
          const dy = (keys.s || touch.d) - (keys.w || touch.u);
          sx += dx * speed * dt;
          sy += dy * speed * dt;
          sx = Math.max(0, Math.min(box.clientWidth - 16, sx));
          sy = Math.max(0, Math.min(box.clientHeight - 16, sy));
          if(soulRef.current) {
            soulRef.current.style.left = sx + 'px';
            soulRef.current.style.top = sy + 'px';
          }

          // Move projs
          projs.forEach(p => {
            if (p.type === 'bone') {
              p.x += p.vx * dt; p.y += p.vy * dt;
              p.el.style.left = p.x + 'px'; p.el.style.top = p.y + 'px';
              if(rectOverlap(sx, sy, 16, 16, p.x, p.y, p.w, p.h)) takeHit();
            } else if (p.type === 'blaster') {
              p.time += dt;
              if (p.state === 0 && p.time > p.delay) {
                p.state = 1; // charge
                p.el.style.opacity = 1;
              } else if (p.state === 1 && p.time > p.delay + 0.8) {
                p.state = 2; // fire
                const beam = document.createElement('div');
                beam.style.position = 'absolute'; beam.style.top = '20px'; beam.style.height = '20px'; beam.style.width = '100%';
                beam.style.animation = 'fireBeam 0.5s ease-out';
                p.el.appendChild(beam);
              } else if (p.state === 2) {
                if (p.time < p.delay + 1.2 && rectOverlap(sx, sy, 16, 16, p.x, p.y+20, p.w, 20)) takeHit();
              }
            }
          });

          if (elapsed < duration) reqRef.current = requestAnimationFrame(loop);
          else {
            projs.forEach(p => p.el.remove());
            onComplete(hitsRef.current);
          }
        };
        reqRef.current = requestAnimationFrame(loop);

        return () => {
          cancelAnimationFrame(reqRef.current);
          window.removeEventListener('keydown', kd); window.removeEventListener('keyup', ku);
          delete window.utTouch;
        };
      }, []);

      const TouchBtn = ({d, label, className}) => React.createElement("button", {
        className: `d-btn ${className}`,
        onTouchStart: (e) => { e.preventDefault(); window.utTouch && window.utTouch(d, 1); },
        onTouchEnd: (e) => { e.preventDefault(); window.utTouch && window.utTouch(d, 0); }
      }, label);

      return React.createElement("div", { className: "minigame-overlay" },
        React.createElement("div", { className: "text-red-500 text-2xl mb-4 font-bold" }, `HITS TAKEN: ${hits}`),
        React.createElement("div", { id: "battlebox", ref: boxRef },
          React.createElement("div", { className: "soul", ref: soulRef }),
          React.createElement("div", { className: "mobile-controls" },
            React.createElement(TouchBtn, { d: 'u', label: '↑', className: 'd-up' }),
            React.createElement(TouchBtn, { d: 'l', label: '←', className: 'd-left' }),
            React.createElement(TouchBtn, { d: 'd', label: '↓', className: 'd-down' }),
            React.createElement(TouchBtn, { d: 'r', label: '→', className: 'd-right' })
          )
        )
      );
    };


    const Card = ({ cardId, onClick, disabled }) => {
      const c = CARDS[cardId];
      if(!c) return null;
      let catClass = c.cat==='ITEMS' ? 'card-cat-items' : c.cat==='OPTIONS' ? 'card-cat-options' : 'card-cat-magic';
      return React.createElement("div", {
        className: `ut-card ${catClass} ${disabled ? 'disabled' : ''}`,
        onClick: disabled ? null : onClick
      },
        React.createElement("div", { className: "card-tag" }, c.cat),
        React.createElement("div", { className: "card-title mt-4" }, c.name),
        React.createElement("div", { className: "card-desc" }, c.desc),
        c.cost > 0 && React.createElement("div", { className: "card-cost" }, `ST ${c.cost}`),
        c.rarity === 'rare' && React.createElement("div", { className: "absolute top-1 right-1 text-yellow-400 text-xs" }, "★")
      );
    };

    // --- MAIN COMPONENT ---
    const App = () => {
      const [user, setUser] = useState(null);
      const [profile, setProfile] = useState(null);
      const [view, setView] = useState('menu'); // menu, shop, matchmaker, battle
      const [match, setMatch] = useState(null); // Current match object
      const [errorMsg, setErrorMsg] = useState("");

      // Init Auth & Profile
      useEffect(() => {
        const initAuth = async () => {
          try {
            if (initialTokenStr) await signInWithCustomToken(auth, initialTokenStr);
            else await signInAnonymously(auth);
          } catch(e) { console.error("Auth err", e); setErrorMsg("Auth Failed"); }
        };
        initAuth();
        const unsub = onAuthStateChanged(auth, u => { setUser(u); });
        return () => unsub();
      }, []);

      useEffect(() => {
        if (!user) return;
        const ref = collection(db, 'artifacts', appId, 'users', user.uid, 'profile');
        const unsub = onSnapshot(ref, snap => {
          if (snap.empty) {
            // Init new profile
            const newProf = { exp: 0, coins: 50, inventory: [] };
            setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data'), newProf);
            setProfile(newProf);
          } else {
            setProfile(snap.docs[0].data());
          }
        }, err => console.error("Profile listen err", err));
        return () => unsub();
      }, [user]);

      // Helpers for profile update
      const updateProfile = async (updates) => {
        if(!user) return;
        await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data'), updates);
      };

      const handleGameEnd = async (didWin, expGain, coinsGain) => {
        if (!profile) return;
        const nExp = profile.exp + expGain;
        const nCoins = profile.coins + coinsGain;
        await updateProfile({ exp: nExp, coins: nCoins });
        alert(`Match Finished!\n${didWin ? 'YOU WON!' : 'YOU LOST.'}\n+${expGain} EXP\n+${coinsGain} G`);
        setView('menu');
        setMatch(null);
      };

      // --- MATCH LOGIC ENGINE ---
      // Apply card effect and return new match state
      const applyCard = (m, actorId, cardId, minigameResult = null) => {
        const nm = JSON.parse(JSON.stringify(m));
        const c = CARDS[cardId];
        const isP1 = nm.p1.uid === actorId;
        const me = isP1 ? nm.p1 : nm.p2;
        const opp = isP1 ? nm.p2 : nm.p1;
        
        // Remove from hand
        const idx = me.hand.indexOf(cardId);
        if(idx > -1) me.hand.splice(idx, 1);
        
        // Cost
        if(c.cost) me.st -= c.cost;

        nm.log.push(`${me.role} used ${c.name}.`);

        if(c.cat === 'ITEMS') {
          if(c.healFull) me.hp = me.maxHp;
          if(c.heal) me.hp = Math.min(me.maxHp, me.hp + c.heal);
          if(c.st) me.st = Math.min(me.maxSt, me.st + c.st);
          if(c.stFull) me.st = me.maxSt;
          if(c.atkBuff) me.atk += c.atkBuff;
        }

        if(c.cat === 'OPTIONS') {
          if(c.id === 'f_fight') {
             // Needs Minigame result
             const mult = minigameResult !== null ? minigameResult : 1;
             const baseDmg = Math.max(1, me.atk - opp.def);
             const dmg = Math.floor(baseDmg * mult);
             opp.hp -= dmg;
             nm.log.push(`Dealt ${dmg} damage! (${mult}x multiplier)`);
          }
          if(c.id === 'f_act') { opp.def = Math.max(0, opp.def - 1); nm.log.push("Enemy DEF dropped."); }
          if(c.id === 'f_mercy' || c.id === 's_mercy') {
             if(Math.random() < 0.2) { nm.status = 'finished'; nm.winner = actorId; nm.log.push("Mercy accepted!"); }
             else nm.log.push("Mercy failed.");
          }
          if(c.id === 's_nap') { me.hp = me.maxHp; nm.log.push("Took a nap. HP restored."); }
        }

        // Magic sets up minigame for opponent
        if(c.cat === 'MAGIC') {
          nm.minigame = { target: opp.uid, type: 'dodge', pattern: c.pattern };
          // Don't switch turn yet, wait for dodge complete
          return nm;
        }

        // Standard Turn end
        nm.turn = opp.uid;
        if(nm.turn === nm.p1.uid) { nm.p1.st = Math.min(nm.p1.maxSt, nm.p1.st + 5); }
        else { nm.p2.st = Math.min(nm.p2.maxSt, nm.p2.st + 5); }

        // Check death
        if(nm.p1.hp <= 0) { nm.status = 'finished'; nm.winner = nm.p2.uid; }
        if(nm.p2.hp <= 0) { nm.status = 'finished'; nm.winner = nm.p1.uid; }

        return nm;
      };

      // --- MATCHMAKING & DB SYNC ---
      const [matchesList, setMatchesList] = useState([]);
      
      // Listen to all matches for matchmaking
      useEffect(() => {
        if(view !== 'matchmaker' || !user) return;
        const matchesRef = collection(db, 'artifacts', appId, 'public', 'data', 'matches');
        const unsub = onSnapshot(matchesRef, snap => {
          const list = [];
          snap.forEach(d => list.push({id: d.id, ...d.data()}));
          setMatchesList(list);
        }, err => console.error(err));
        return () => unsub();
      }, [view, user]);

      // Listen to active match
      useEffect(() => {
        if(!match || !user || match.isSolo) return;
        const matchRef = doc(db, 'artifacts', appId, 'public', 'data', 'matches', match.id);
        const unsub = onSnapshot(matchRef, snap => {
          if(snap.exists()) {
            const data = snap.data();
            setMatch(data);
            if(data.status === 'finished') {
              const won = data.winner === user.uid;
              handleGameEnd(won, won ? 50 : 10, won ? 20 : 5);
            }
          }
        }, err => console.error(err));
        return () => unsub();
      }, [match?.id, user]);

      const joinMatch = async (existingId) => {
        try {
          const deck = getDeck('Sans');
          const oppStats = { hp: 1, maxHp: 1, atk: 1, def: 1, st: 100, maxSt: 100 };
          const p2Data = { uid: user.uid, role: 'Sans', hand: deck, ...oppStats };
          
          if(existingId) {
             // Join
             const ref = doc(db, 'artifacts', appId, 'public', 'data', 'matches', existingId);
             await updateDoc(ref, { p2: p2Data, status: 'playing' });
             setMatch({ id: existingId, isSolo: false });
          } else {
             // Create
             const lv = getLevel(profile.exp);
             const myStats = getStatsForLV(lv);
             const p1Data = { uid: user.uid, role: 'Frisk', hand: getDeck('Frisk'), ...myStats, st: 0, maxSt: 0 };
             const mRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'matches'));
             const newMatch = {
               id: mRef.id, status: 'waiting', turn: user.uid,
               p1: p1Data, p2: null, log: ['Match created. Waiting for opponent...'], minigame: null
             };
             await setDoc(mRef, newMatch);
             setMatch({ id: mRef.id, isSolo: false });
          }
          setView('battle');
        } catch(e) { console.error(e); setErrorMsg("Match error"); }
      };

      const startSolo = () => {
        const lv = getLevel(profile.exp);
        const myStats = getStatsForLV(lv);
        const m = {
          id: 'solo', isSolo: true, status: 'playing', turn: user.uid,
          p1: { uid: user.uid, role: 'Frisk', hand: getDeck('Frisk'), ...myStats, st: 0, maxSt: 0 },
          p2: { uid: 'ai', role: 'Sans', hand: getDeck('Sans'), hp: 1, maxHp: 1, atk: 1, def: 1, st: 100, maxSt: 100 },
          log: ['Encountered AI Sans!'], minigame: null
        };
        setMatch(m);
        setView('battle');
      };

      const getDeck = (role) => {
        let pool = [...DEFAULT_DECK[role]];
        if(profile && profile.inventory) {
          const rolePremium = profile.inventory.filter(cid => CARDS[cid].role === role);
          pool = pool.concat(rolePremium);
        }
        // Shuffle and pick 6
        return pool.sort(()=>Math.random()-0.5).slice(0, 6);
      };

      // --- BATTLE ACTIONS ---
      const handlePlayCard = async (cardId) => {
        if (match.turn !== user.uid || match.minigame) return;
        const c = CARDS[cardId];
        
        if(c.id === 'f_fight') {
          // Trigger local fight minigame first, then dispatch
          setMatch({...match, pendingFight: cardId});
          return;
        }

        const nm = applyCard(match, user.uid, cardId);
        updateMatchState(nm);
      };

      const handleFightComplete = (mult) => {
        const nm = applyCard(match, user.uid, match.pendingFight, mult);
        nm.pendingFight = null;
        updateMatchState(nm);
      };

      const handleDodgeComplete = (hits) => {
        const nm = JSON.parse(JSON.stringify(match));
        const isP1 = nm.p1.uid === user.uid;
        const me = isP1 ? nm.p1 : nm.p2;
        
        if (hits > 0) {
          const dmg = hits * 2;
          me.hp -= dmg;
          nm.log.push(`${me.role} took ${dmg} damage from attacks!`);
        } else {
          nm.log.push(`${me.role} dodged everything!`);
        }

        nm.minigame = null;
        nm.turn = user.uid; // Attack over, my turn
        if(isP1) nm.p1.st = Math.min(nm.p1.maxSt, nm.p1.st + 5);
        else nm.p2.st = Math.min(nm.p2.maxSt, nm.p2.st + 5);

        if(nm.p1.hp <= 0) { nm.status = 'finished'; nm.winner = nm.p2.uid; }
        if(nm.p2.hp <= 0) { nm.status = 'finished'; nm.winner = nm.p1.uid; }

        updateMatchState(nm);
      };

      const updateMatchState = async (nm) => {
        if(nm.isSolo) {
           setMatch(nm);
           if(nm.status === 'finished') {
             const won = nm.winner === user.uid;
             setTimeout(() => handleGameEnd(won, won ? 20 : 5, won ? 10 : 2), 1000);
           } else if (nm.turn === 'ai') {
             setTimeout(() => runAI(nm), 1000);
           }
        } else {
           // Firestore update
           const ref = doc(db, 'artifacts', appId, 'public', 'data', 'matches', nm.id);
           await updateDoc(ref, nm);
        }
      };

      const runAI = (m) => {
        if(m.status !== 'playing') return;
        const ai = m.p2;
        const hand = ai.hand;
        if(hand.length === 0) {
          // AI passes
          const nm = JSON.parse(JSON.stringify(m));
          nm.log.push("AI passes.");
          nm.turn = m.p1.uid;
          updateMatchState(nm);
          return;
        }

        // Logic
        let choice = hand.find(c => CARDS[c].cat === 'MAGIC' && ai.st >= CARDS[c].cost);
        if(!choice && ai.st < 30) choice = hand.find(c => CARDS[c].cat === 'ITEMS' && CARDS[c].st);
        if(!choice) choice = hand[0];

        const nm = applyCard(m, 'ai', choice);
        updateMatchState(nm);
      };

      // --- RENDERS ---
      if (!user || !profile) return React.createElement("div", {className: "p-8 text-center"}, "LOADING DETERMINATION...");

      const lv = getLevel(profile.exp);

      if (view === 'menu') {
        return React.createElement("div", { className: "max-w-3xl mx-auto p-4 flex flex-col items-center h-screen justify-center gap-8" },
          React.createElement("h1", { className: "text-4xl md:text-6xl text-center mb-8", style: { letterSpacing: '4px' } }, "UNDERTALE\nCARD DUEL"),
          React.createElement("div", { className: "ut-panel w-full max-w-md text-center" },
            React.createElement("div", { className: "text-2xl text-yellow-400 mb-2" }, `LOVE ${lv}  |  ${profile.coins} G`),
            React.createElement("div", { className: "text-gray-400 mb-4" }, `EXP: ${profile.exp}`)
          ),
          React.createElement("div", { className: "flex flex-col gap-4 w-full max-w-sm" },
            React.createElement("button", { className: "ut-btn", onClick: () => startSolo() }, "PLAY OFFLINE (SOLO)"),
            React.createElement("button", { className: "ut-btn", onClick: () => setView('matchmaker') }, "PLAY ONLINE (MULTI)"),
            React.createElement("button", { className: "ut-btn", onClick: () => setView('shop') }, "TEMMIE SHOP")
          )
        );
      }

      if (view === 'shop') {
        // Pseudo-random daily shop based on date
        const seed = Math.floor(Date.now() / 86400000);
        const shopCards = [
          PREMIUM_POOL[seed % PREMIUM_POOL.length],
          PREMIUM_POOL[(seed+1) % PREMIUM_POOL.length],
          PREMIUM_POOL[(seed+2) % PREMIUM_POOL.length]
        ];

        const buyCard = (cid) => {
          if(profile.coins >= 50 && !profile.inventory.includes(cid)) {
             updateProfile({ coins: profile.coins - 50, inventory: [...profile.inventory, cid] });
          }
        };

        return React.createElement("div", { className: "max-w-4xl mx-auto p-4 flex flex-col h-screen" },
          React.createElement("div", { className: "flex justify-between items-center mb-8" },
            React.createElement("button", { className: "ut-btn", onClick: () => setView('menu') }, "BACK"),
            React.createElement("div", { className: "text-3xl text-yellow-400" }, `${profile.coins} G`)
          ),
          React.createElement("h2", { className: "text-4xl mb-4 text-center" }, "HOi! welcome to... TEM SHOP!"),
          React.createElement("p", { className: "text-center mb-8 text-gray-400" }, "Daily Premium Cards (50G each). Click to buy!"),
          React.createElement("div", { className: "flex justify-center gap-6 flex-wrap" },
            shopCards.map(cid => {
              const owned = profile.inventory.includes(cid);
              const canAfford = profile.coins >= 50;
              return React.createElement("div", { key: cid, className: "flex flex-col items-center gap-4" },
                React.createElement(Card, { cardId: cid, disabled: owned }),
                React.createElement("button", {
                  className: "ut-btn",
                  disabled: owned || !canAfford,
                  onClick: () => buyCard(cid)
                }, owned ? "SOLD OUT" : "BUY 50G")
              );
            })
          )
        );
      }

      if (view === 'matchmaker') {
        const waitingMatch = matchesList.find(m => m.status === 'waiting' && m.turn !== user.uid);
        
        return React.createElement("div", { className: "max-w-xl mx-auto p-4 flex flex-col h-screen justify-center" },
          React.createElement("button", { className: "ut-btn absolute top-4 left-4", onClick: () => setView('menu') }, "BACK"),
          React.createElement("h2", { className: "text-4xl mb-8 text-center" }, "ONLINE MULTIPLAYER"),
          React.createElement("div", { className: "ut-panel flex flex-col gap-6 p-8" },
            waitingMatch ? 
              React.createElement("div", { className: "text-center" },
                React.createElement("p", { className: "mb-4 text-xl text-green-400" }, "Match found!"),
                React.createElement("button", { className: "ut-btn w-full", onClick: () => joinMatch(waitingMatch.id) }, "JOIN AS SANS")
              )
            :
              React.createElement("div", { className: "text-center" },
                React.createElement("p", { className: "mb-4 text-xl text-gray-400" }, "No opponents waiting."),
                React.createElement("button", { className: "ut-btn w-full", onClick: () => joinMatch(null) }, "HOST AS FRISK")
              )
          )
        );
      }

      if (view === 'battle') {
        if (!match) return null;
        
        const isP1 = match.p1 && match.p1.uid === user.uid;
        const me = isP1 ? match.p1 : match.p2;
        const opp = isP1 ? match.p2 : match.p1;
        
        if (!me || !opp) return React.createElement("div", {className: "p-8 text-center text-2xl"}, "Waiting for opponent to join...");

        const isMyTurn = match.status === 'playing' && match.turn === user.uid;

        return React.createElement("div", { className: `max-w-5xl mx-auto p-4 h-screen flex flex-col ${match.status==='finished'?'opacity-50':''}` },
          
          // Header / Opponent Info
          React.createElement("div", { className: "ut-panel mb-4 flex justify-between items-center bg-gray-900" },
             React.createElement("div", null,
               React.createElement("div", { className: "text-2xl" }, `${opp.role} ${opp.uid==='ai'?'(AI)':''}`),
               React.createElement("div", { className: "text-gray-400" }, `ATK ${opp.atk} | DEF ${opp.def}`)
             ),
             React.createElement("div", { className: "w-1/3" },
               React.createElement("div", { className: "flex justify-between" }, React.createElement("span", null, "HP"), React.createElement("span", null, `${opp.hp}/${opp.maxHp}`)),
               React.createElement("div", { className: "bar-bg mb-1" }, React.createElement("div", { className: "bar-fill-hp", style: { width: `${(opp.hp/opp.maxHp)*100}%` } })),
               opp.maxSt > 0 && React.createElement("div", null,
                 React.createElement("div", { className: "flex justify-between" }, React.createElement("span", null, "ST"), React.createElement("span", null, `${opp.st}/${opp.maxSt}`)),
                 React.createElement("div", { className: "bar-bg" }, React.createElement("div", { className: "bar-fill-st", style: { width: `${(opp.st/opp.maxSt)*100}%` } }))
               )
             )
          ),

          // Log / Center Area
          React.createElement("div", { className: "ut-panel flex-grow mb-4 flex flex-col overflow-hidden" },
             React.createElement("div", { className: "flex-grow overflow-y-auto flex flex-col-reverse p-2", style: { fontSize: '24px' } },
               [...match.log].reverse().map((l, i) => React.createElement("div", { key: i, className: "mb-2" }, `* ${l}`))
             ),
             React.createElement("div", { className: "mt-4 text-center text-yellow-400 font-bold" },
               isMyTurn ? "YOUR TURN" : (match.status === 'playing' ? "OPPONENT'S TURN..." : "MATCH OVER")
             )
          ),

          // Player Info
          React.createElement("div", { className: "flex justify-between items-end mb-4" },
             React.createElement("div", { className: "w-1/3" },
               React.createElement("div", { className: "text-3xl mb-1" }, `${me.role}  LV ${lv}`),
               React.createElement("div", { className: "flex gap-2 items-center" }, 
                 React.createElement("span", { className: "text-2xl text-red-500" }, "HP"),
                 React.createElement("div", { className: "bar-bg w-48 mx-2" }, React.createElement("div", { className: "bar-fill-hp", style: { width: `${(me.hp/me.maxHp)*100}%` } })),
                 React.createElement("span", { className: "text-2xl" }, `${me.hp}/${me.maxHp}`)
               ),
               me.maxSt > 0 && React.createElement("div", { className: "flex gap-2 items-center mt-2" }, 
                 React.createElement("span", { className: "text-2xl text-green-500" }, "ST"),
                 React.createElement("div", { className: "bar-bg w-48 mx-2" }, React.createElement("div", { className: "bar-fill-st", style: { width: `${(me.st/me.maxSt)*100}%` } })),
                 React.createElement("span", { className: "text-2xl" }, `${me.st}/${me.maxSt}`)
               )
             ),
             React.createElement("button", { className: "ut-btn text-sm", onClick: () => { setMatch(null); setView('menu'); } }, "FLEE (QUIT)")
          ),

          // Hand
          React.createElement("div", { className: "flex gap-4 justify-center overflow-x-auto pb-4" },
             me.hand.map((cid, i) => React.createElement(Card, { 
               key: i, cardId: cid, 
               disabled: !isMyTurn || (CARDS[cid].cost && me.st < CARDS[cid].cost),
               onClick: () => handlePlayCard(cid) 
             }))
          ),

          // Minigames
          match.pendingFight && React.createElement(FightMinigame, { onComplete: handleFightComplete }),
          match.minigame && match.minigame.target === user.uid && React.createElement(DodgeMinigame, { pattern: match.minigame.pattern, onComplete: handleDodgeComplete })
        );
      }

      return null;
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  };

  // Environment bindings injected
  const _fbConfig = typeof __firebase_config !== 'undefined' ? __firebase_config : '{}';
  const _appId = typeof __app_id !== 'undefined' ? __app_id : 'undertale-duel-1';
  const _initToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : '';
  
  // Guard initialization inside window load
  window.onload = () => window.initReactApp(_fbConfig, _appId, _initToken);
</script>
</body>
